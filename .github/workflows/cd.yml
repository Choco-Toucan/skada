name: CD

# 需要配置的 Secrets:
#   OSS_ACCESS_KEY_ID    — 阿里云 RAM AccessKey ID
#   OSS_ACCESS_KEY_SECRET — 阿里云 RAM AccessKey Secret
#   OSS_ENDPOINT         — OSS endpoint，如 oss-cn-hangzhou.aliyuncs.com
#   OSS_BUCKET           — OSS bucket 名称
#   DEPLOY_WEBHOOK_URL_TEST   — 部署触发 webhook 地址 (test 环境)
#   DEPLOY_WEBHOOK_SECRET_TEST — 部署触发 webhook 的 X-Deploy-Secret (test 环境)
#   FEISHU_WEBHOOK_URL   — 飞书机器人 webhook 地址

on:
  push:
    branches: [deploy_test]
  workflow_dispatch:

jobs:
  cd:
    runs-on: ubuntu-latest

    env:
      COMMIT_ID: ${{ github.sha }}
      OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
      OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
      DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL_TEST }}
      DEPLOY_WEBHOOK_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET_TEST }}
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}

    outputs:
      api_exists: ${{ steps.check_oss.outputs.api_exists }}
      mng_exists: ${{ steps.check_oss.outputs.mng_exists }}
      web_exists: ${{ steps.check_oss.outputs.web_exists }}

    steps:
      # ==================== 1. 检出代码 ====================
      - uses: actions/checkout@v4

      # ==================== 2. 安装 ossutil ====================
      - name: 安装 ossutil
        id: ossutil_setup
        run: |
          OSSUTIL_VER="2.3.0"
          if curl -sL -o /tmp/ossutil.zip \
            "https://gosspublic.alicdn.com/ossutil/v2/${OSSUTIL_VER}/ossutil-${OSSUTIL_VER}-linux-amd64.zip"; then
            echo "ossutil 下载成功"
          else
            echo "ossutil 下载失败"
            exit 1
          fi
          unzip -qo /tmp/ossutil.zip -d /tmp/ossutil
          sudo mv "/tmp/ossutil/ossutil-${OSSUTIL_VER}-linux-amd64/ossutil" /usr/local/bin/ossutil
          sudo chmod +x /usr/local/bin/ossutil

          # 从 endpoint 提取 region（如 oss-cn-hangzhou.aliyuncs.com → cn-hangzhou）
          OSS_REGION=$(echo "$OSS_ENDPOINT" | sed 's/^oss-//; s/\.aliyuncs\.com$//; s/-internal$//')
          echo "OSS_REGION=$OSS_REGION" >> $GITHUB_ENV

          echo "ossutil 安装完成，region=$OSS_REGION"

      # ==================== 3. 检查 OSS 远端制品 ====================
      - name: 检查 OSS 远端制品是否存在
        id: check_oss
        env:
          AK_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          AK_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          OSS_FLAGS="-i $AK_ID -k $AK_SECRET -e $OSS_ENDPOINT --region $OSS_REGION"

          # 先验证凭证连通性
          echo "=== 连通性验证 ==="
          if ossutil ls "oss://${OSS_BUCKET}/package/" --limited-num 1 $OSS_FLAGS 2>&1; then
            echo "连通性验证: 通过"
          else
            echo "连通性验证: 失败，请检查 AK/SK/Endpoint/Bucket 配置及 RAM 权限"
            exit 1
          fi

          API_PATH="oss://${OSS_BUCKET}/package/api-service/${COMMIT_ID}.jar"
          MNG_PATH="oss://${OSS_BUCKET}/package/mng-service/${COMMIT_ID}.jar"
          WEB_PATH="oss://${OSS_BUCKET}/package/mng-web/${COMMIT_ID}.tar.gz"

          check_exists() {
            local path="$1" output
            echo "=== check_exists: $path ==="
            output=$(ossutil stat "$path" $OSS_FLAGS 2>&1) || true
            echo "$output"
            # 404 / 对象不存在 — 必须最先判断
            if echo "$output" | grep -qi "NoSuchKey\|does not exist\|StatusCode: 404"; then
              echo "→ 结果: 不存在 (404)"
              return 1
            fi
            # 403 / 权限错误
            if echo "$output" | grep -qi "AccessDenied\|Forbidden\|StatusCode: 403"; then
              echo "→ 结果: 权限错误 (403)"
              return 2
            fi
            # 其他未知错误
            if echo "$output" | grep -qi "Error"; then
              echo "→ 结果: 未知错误"
              return 2
            fi
            # 对象存在
            echo "→ 结果: 已存在"
            return 0
          }

          API_EXISTS="false"; MNG_EXISTS="false"; WEB_EXISTS="false"

          check_exists "$API_PATH"
          case $? in
            0) API_EXISTS="true" ;;
            1) API_EXISTS="false" ;;
            2) exit 1 ;;
          esac

          check_exists "$MNG_PATH"
          case $? in
            0) MNG_EXISTS="true" ;;
            1) MNG_EXISTS="false" ;;
            2) exit 1 ;;
          esac

          check_exists "$WEB_PATH"
          case $? in
            0) WEB_EXISTS="true" ;;
            1) WEB_EXISTS="false" ;;
            2) exit 1 ;;
          esac

          echo "api_exists=$API_EXISTS" >> $GITHUB_OUTPUT
          echo "mng_exists=$MNG_EXISTS" >> $GITHUB_OUTPUT
          echo "web_exists=$WEB_EXISTS" >> $GITHUB_OUTPUT

          echo "=== 汇总 ==="
          echo "api-service : $API_EXISTS"
          echo "mng-service : $MNG_EXISTS"
          echo "mng-web     : $WEB_EXISTS"

          if [ "$API_EXISTS" = "true" ] && [ "$MNG_EXISTS" = "true" ] && [ "$WEB_EXISTS" = "true" ]; then
            echo "all_skip=true" >> $GITHUB_OUTPUT
          else
            echo "all_skip=false" >> $GITHUB_OUTPUT
          fi

      # ==================== 4. 安装 JDK 21 (按需) ====================
      - name: 安装 JDK 21
        id: setup_java
        if: steps.check_oss.outputs.all_skip != 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # ==================== 5. 编译 Java 模块 & 测试 ====================
      - name: 编译 Java 模块 & 测试
        id: maven_build
        if: steps.check_oss.outputs.all_skip != 'true' && (steps.check_oss.outputs.api_exists != 'true' || steps.check_oss.outputs.mng_exists != 'true')
        run: |
          START=$(date +%s)
          if mvn clean package -DskipTests=false 2>&1 | tee build.log; then
            END=$(date +%s)
            echo "cost=$((END - START))" >> $GITHUB_OUTPUT
            echo "result=success" >> $GITHUB_OUTPUT
          else
            echo "result=failure" >> $GITHUB_OUTPUT
            echo "Maven build failed — see build.log"
            exit 1
          fi

      # ==================== 6. 安装 Node.js (按需) ====================
      - name: 安装 Node.js
        id: setup_node
        if: steps.check_oss.outputs.all_skip != 'true' && steps.check_oss.outputs.web_exists != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: mng-web/package-lock.json

      # ==================== 7. 构建前端 (按需) ====================
      - name: 构建前端
        id: frontend_build
        if: steps.check_oss.outputs.all_skip != 'true' && steps.check_oss.outputs.web_exists != 'true'
        run: |
          cd mng-web
          START=$(date +%s)
          npm ci
          if npm run build 2>&1 | tee build.log; then
            END=$(date +%s)
            echo "cost=$((END - START))" >> $GITHUB_OUTPUT
            echo "result=success" >> $GITHUB_OUTPUT
          else
            echo "result=failure" >> $GITHUB_OUTPUT
            echo "npm build failed — see build.log"
            exit 1
          fi

      # ==================== 8. 打包 & 上传 OSS ====================
      - name: 打包 api-service 并上传
        id: upload_api
        if: steps.check_oss.outputs.api_exists != 'true'
        env:
          AK_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          AK_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          OSS_FLAGS="-i $AK_ID -k $AK_SECRET -e $OSS_ENDPOINT --region $OSS_REGION"
          SRC=$(find api-service/target -maxdepth 1 -name '*.jar' ! -name '*-sources.jar' | head -1)
          OSS_PATH="oss://${OSS_BUCKET}/package/api-service/${COMMIT_ID}.jar"
          echo "Uploading $SRC → $OSS_PATH"
          if ossutil cp "$SRC" "$OSS_PATH" $OSS_FLAGS; then
            echo "result=success" >> $GITHUB_OUTPUT
          else
            echo "result=failure" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "oss_path=$OSS_PATH" >> $GITHUB_OUTPUT

      - name: 打包 mng-service 并上传
        id: upload_mng
        if: steps.check_oss.outputs.mng_exists != 'true'
        env:
          AK_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          AK_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          OSS_FLAGS="-i $AK_ID -k $AK_SECRET -e $OSS_ENDPOINT --region $OSS_REGION"
          SRC=$(find mng-service/target -maxdepth 1 -name '*.jar' ! -name '*-sources.jar' | head -1)
          OSS_PATH="oss://${OSS_BUCKET}/package/mng-service/${COMMIT_ID}.jar"
          echo "Uploading $SRC → $OSS_PATH"
          if ossutil cp "$SRC" "$OSS_PATH" $OSS_FLAGS; then
            echo "result=success" >> $GITHUB_OUTPUT
          else
            echo "result=failure" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "oss_path=$OSS_PATH" >> $GITHUB_OUTPUT

      - name: 打包 mng-web 并上传
        id: upload_web
        if: steps.check_oss.outputs.web_exists != 'true'
        env:
          AK_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          AK_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          OSS_FLAGS="-i $AK_ID -k $AK_SECRET -e $OSS_ENDPOINT --region $OSS_REGION"
          TARBALL="mng-web-${COMMIT_ID}.tar.gz"
          OSS_PATH="oss://${OSS_BUCKET}/package/mng-web/${COMMIT_ID}.tar.gz"
          tar czf "$TARBALL" -C mng-web/dist .
          echo "Uploading $TARBALL → $OSS_PATH"
          if ossutil cp "$TARBALL" "$OSS_PATH" $OSS_FLAGS; then
            echo "result=success" >> $GITHUB_OUTPUT
          else
            echo "result=failure" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "oss_path=$OSS_PATH" >> $GITHUB_OUTPUT

      # ==================== 9. 调用部署 webhook ====================
      - name: 调用部署 webhook
        id: deploy_webhook
        run: |
          # 构建 services 数组
          if [ "${{ steps.check_oss.outputs.all_skip }}" = "true" ]; then
            SERVICES='["api-service", "mng-service", "mng-web"]'
          else
            items=""
            if [ "${{ steps.check_oss.outputs.api_exists }}" = "false" ]; then
              items="${items}${items:+, }\"api-service\""
            fi
            if [ "${{ steps.check_oss.outputs.mng_exists }}" = "false" ]; then
              items="${items}${items:+, }\"mng-service\""
            fi
            if [ "${{ steps.check_oss.outputs.web_exists }}" = "false" ]; then
              items="${items}${items:+, }\"mng-web\""
            fi
            SERVICES="[$items]"
          fi

          echo "services=$SERVICES" >> $GITHUB_OUTPUT

          RESPONSE=$(mktemp)
          HTTP_CODE=$(curl -s -w "%{http_code}" -o "$RESPONSE" \
            -X POST "$DEPLOY_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Deploy-Secret: $DEPLOY_WEBHOOK_SECRET" \
            -d "{\"commit\":\"${COMMIT_ID}\",\"services\":$SERVICES}")

          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          BODY=$(cat "$RESPONSE")
          echo "response_body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "Webhook HTTP $HTTP_CODE"
          echo "$BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "webhook_failed=true" >> $GITHUB_OUTPUT
          else
            echo "webhook_failed=false" >> $GITHUB_OUTPUT
          fi

      # ==================== 10. 飞书通知 ====================
      - name: 发送飞书通知
        if: always()
        env:
          OSSUTIL_RESULT: ${{ steps.ossutil_setup.outcome }}
          CHECK_OSS_RESULT: ${{ steps.check_oss.outcome }}
          BE_RESULT: ${{ steps.maven_build.outcome }}
          FRONTEND_RESULT: ${{ steps.frontend_build.outcome }}
          UPLOAD_API_RESULT: ${{ steps.upload_api.outcome }}
          UPLOAD_MNG_RESULT: ${{ steps.upload_mng.outcome }}
          UPLOAD_WEB_RESULT: ${{ steps.upload_web.outcome }}
          ALL_SKIP: ${{ steps.check_oss.outputs.all_skip }}
          API_EXISTS: ${{ steps.check_oss.outputs.api_exists }}
          MNG_EXISTS: ${{ steps.check_oss.outputs.mng_exists }}
          WEB_EXISTS: ${{ steps.check_oss.outputs.web_exists }}
          WEBHOOK_CODE: ${{ steps.deploy_webhook.outputs.http_code }}
          WEBHOOK_BODY_RAW: ${{ steps.deploy_webhook.outputs.response_body }}
          WEBHOOK_FAILED: ${{ steps.deploy_webhook.outputs.webhook_failed }}
          BRANCH: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$FEISHU_WEBHOOK_URL" ]; then
            echo "FEISHU_WEBHOOK_URL 未配置，跳过通知"
            exit 0
          fi

          # 转义 webhook body
          WEBHOOK_BODY=$(echo "$WEBHOOK_BODY_RAW" | sed 's/\\/\\\\/g; s/"/\\"/g')

          # ---- 按阶段链式判定 ----
          if [ "$OSSUTIL_RESULT" = "failure" ]; then
            STATUS="❌ CD 失败 — ossutil 安装/配置"
            STATUS_COLOR="red"
          elif [ "$CHECK_OSS_RESULT" = "failure" ]; then
            STATUS="❌ CD 失败 — OSS 远端制品检查"
            STATUS_COLOR="red"
          elif [ "$BE_RESULT" = "failure" ] || [ "$FRONTEND_RESULT" = "failure" ]; then
            if [ "$BE_RESULT" = "failure" ]; then STAGE="Maven 编译/测试"; else STAGE="Vue 前端构建"; fi
            STATUS="❌ 构建失败 — ${STAGE}"
            STATUS_COLOR="red"
          elif [ "$UPLOAD_API_RESULT" = "failure" ] || [ "$UPLOAD_MNG_RESULT" = "failure" ] || [ "$UPLOAD_WEB_RESULT" = "failure" ]; then
            STATUS="❌ CD 失败 — OSS 制品上传"
            STATUS_COLOR="red"
          elif [ "$ALL_SKIP" = "true" ]; then
            STATUS="⚠️ 跳过部署"
            STATUS_COLOR="yellow"
          elif [ "$WEBHOOK_FAILED" = "true" ]; then
            STATUS="❌ Webhook 失败"
            STATUS_COLOR="red"
          else
            STATUS="✅ 部署成功"
            STATUS_COLOR="green"
          fi

          # ---- 制品标签 ----
          label() {
            if [ "$1" = "true" ]; then echo "(已存在，跳过)"
            elif [ "$2" = "success" ]; then echo "✅ 上传成功"
            elif [ "$2" = "failure" ]; then echo "❌ 上传失败"
            else echo "—"; fi
          }
          API_LABEL=$(label "$API_EXISTS" "$UPLOAD_API_RESULT")
          MNG_LABEL=$(label "$MNG_EXISTS" "$UPLOAD_MNG_RESULT")
          WEB_LABEL=$(label "$WEB_EXISTS" "$UPLOAD_WEB_RESULT")

          # ---- 详情 ----
          DETAIL="**${BRANCH}**\\n仓库: ${REPO}\\n提交: ${COMMIT_ID}"

          if [ "$WEBHOOK_FAILED" = "true" ]; then
            WH_ESCAPED=$(echo "$WEBHOOK_BODY" | sed 's/\\/\\\\/g; s/"/\\"/g')
            DETAIL="${DETAIL}\\n\\nWebhook 响应:\\nHTTP 状态码: ${WEBHOOK_CODE}\\nBody: ${WH_ESCAPED}"
          fi

          if [ "$ALL_SKIP" = "true" ]; then
            DETAIL="${DETAIL}\\n\\n该 commit 已部署过，OSS 制品全部存在"
          fi

          # ---- 发送 ----
          curl -s --connect-timeout 30 --max-time 60 --retry 2 -X POST "$FEISHU_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "$(cat <<JSON
          {
            "msg_type": "interactive",
            "card": {
              "header": {
                "title": { "tag": "plain_text", "content": "${STATUS}" },
                "template": "${STATUS_COLOR}"
              },
              "elements": [
                {
                  "tag": "div",
                  "text": {
                    "tag": "lark_md",
                    "content": "${DETAIL}"
                  }
                },
                { "tag": "hr" },
                {
                  "tag": "div",
                  "text": {
                    "tag": "lark_md",
                    "content": "api-service: ${API_LABEL}\\nmng-service: ${MNG_LABEL}\\nmng-web:     ${WEB_LABEL}"
                  }
                },
                {
                  "tag": "action",
                  "actions": [
                    {
                      "tag": "button",
                      "text": { "tag": "plain_text", "content": "查看详情" },
                      "url": "${RUN_URL}",
                      "type": "primary"
                    }
                  ]
                }
              ]
            }
          }
          JSON
          )"
