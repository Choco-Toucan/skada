name: Claude Code 审查

# 需要配置的 Secrets（加密存储）:
#   ANTHROPIC_API_KEY  — API 密钥
#   FEISHU_WEBHOOK_URL — 飞书机器人 webhook 地址
#
# 需要配置的 Variables（明文存储）:
#   ANTHROPIC_BASE_URL — API 代理地址
#   CLAUDE_MODEL       — 模型名称，如 claude-sonnet-4-6

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code 代码审查
        id: claude
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            审查本次 PR 相对于 origin/main 的所有变更。

            本项目是 monorepo：
            - api-service：对外排行榜 API（Spring Boot + MyBatis + Redis）
            - mng-service：管理后台 API（Spring Boot + MyBatis）
            - common：共享拦截器/工具类
            - mng-web：Vue3 + Ant Design Vue 管理前端

            按严重程度（CRITICAL/HIGH/MEDIUM/LOW）检查：
            1. 安全：SQL注入、密钥泄露、越权、XSS、敏感日志
            2. Java：NPE、MyBatis Mapper 缺失字段、事务注解遗漏
            3. Vue：类型安全、空值保护、XSS 风险
            4. 通用：命名规范、死代码、函数过长

            将结果作为 PR Review 发布，每条问题标注文件路径和行号。
          claude_args: |
            --model ${{ vars.CLAUDE_MODEL }}
        env:
          ANTHROPIC_BASE_URL: ${{ vars.ANTHROPIC_BASE_URL }}

      - name: 飞书通知
        if: always()
        env:
          REVIEW_RESULT: ${{ steps.claude.outcome }}
          WEBHOOK: ${{ secrets.FEISHU_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "FEISHU_WEBHOOK_URL 未配置，跳过通知"
            exit 0
          fi
          if [ "$REVIEW_RESULT" = "success" ]; then
            STATUS="✅ Claude Code 审查完成"
            COLOR="green"
            BODY="审查已完成并发布到 PR 评论区。"
          elif [ "$REVIEW_RESULT" = "failure" ]; then
            STATUS="❌ Claude Code 审查执行失败"
            COLOR="red"
            BODY="可能是 API Key 未配置或网络问题，请检查 GitHub Secrets。"
          else
            STATUS="⚠️ Claude Code 审查被跳过"
            COLOR="yellow"
            BODY="步骤未正常执行。"
          fi

          curl -s -X POST "$WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "$(cat <<JSON
          {
            "msg_type": "interactive",
            "card": {
              "header": {
                "title": { "tag": "plain_text", "content": "${STATUS}" },
                "template": "${COLOR}"
              },
              "elements": [
                {
                  "tag": "div",
                  "text": {
                    "tag": "lark_md",
                    "content": "**PR #${PR_NUMBER} ${PR_TITLE}**\n${BODY}"
                  }
                },
                {
                  "tag": "action",
                  "actions": [
                    {
                      "tag": "button",
                      "text": { "tag": "plain_text", "content": "查看 PR" },
                      "url": "${PR_URL}",
                      "type": "primary"
                    }
                  ]
                }
              ]
            }
          }
          JSON
          )"
