name: CI

# 需要配置的 Secrets:
#   FEISHU_WEBHOOK_URL — 飞书机器人 webhook 地址

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.build.outputs.result }}
      testSummary: ${{ steps.extract-tests.outputs.summary }}
      coverage: ${{ steps.extract-tests.outputs.coverage }}
    steps:
      - uses: actions/checkout@v4

      - name: 安装 JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: 编译全部 Java 模块 & 测试
        id: build
        run: |
          START=$(date +%s)
          if mvn clean package -DskipTests=false 2>&1 | tee build.log; then
            END=$(date +%s)
            echo "cost=$((END - START))" >> $GITHUB_OUTPUT
            echo "result=success" >> $GITHUB_OUTPUT
          else
            echo "result=failure" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: 提取测试结果摘要
        id: extract-tests
        if: always()
        run: |
          # 提取 surefire 测试汇总（取最后一条 "Tests run:" 行）
          TEST_LINE=$(grep "Tests run:" build.log | tail -1 || true)
          if [ -n "$TEST_LINE" ]; then
            echo "summary=${TEST_LINE//,/ }" >> $GITHUB_OUTPUT
          else
            echo "summary=无测试结果" >> $GITHUB_OUTPUT
          fi

          # 提取 JaCoCo 行覆盖率
          COV_FILE=api-service/target/site/jacoco/jacoco.csv
          if [ -f "$COV_FILE" ]; then
            COV=$(python3 -c "
  import csv
  with open('$COV_FILE') as f:
      total_line_m = total_line_c = 0
      for row in csv.DictReader(f):
          total_line_m += int(row['LINE_MISSED'])
          total_line_c += int(row['LINE_COVERED'])
      total = total_line_m + total_line_c
      pct = total_line_c / total * 100 if total > 0 else 0
      print(f'{pct:.1f}%')
  ")
            echo "coverage=${COV}" >> $GITHUB_OUTPUT
          else
            echo "coverage=N/A" >> $GITHUB_OUTPUT
          fi

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mng-web

    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: mng-web/package-lock.json

      - name: 安装依赖 & 构建
        id: build
        run: |
          START=$(date +%s)
          npm ci
          if npm run build 2>&1 | tee build.log; then
            END=$(date +%s)
            echo "cost=$((END - START))" >> $GITHUB_OUTPUT
            echo "result=success" >> $GITHUB_OUTPUT
          else
            echo "result=failure" >> $GITHUB_OUTPUT
            exit 1
          fi

  # ==================== 飞书通知 ====================
  notify:
    needs: [backend, frontend]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 发送飞书通知
        env:
          BE_RESULT: ${{ needs.backend.result }}
          FRONTEND_RESULT: ${{ needs.frontend.result }}
          TEST_SUMMARY: ${{ needs.backend.outputs.testSummary }}
          COVERAGE: ${{ needs.backend.outputs.coverage }}
          WEBHOOK: ${{ secrets.FEISHU_WEBHOOK_URL }}
          BRANCH: ${{ github.head_ref || github.ref_name }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          EVENT: ${{ github.event_name }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "FEISHU_WEBHOOK_URL 未配置，跳过通知"
            exit 0
          fi

          if [ "$EVENT" = "pull_request" ]; then
            TITLE="CI #${PR_NUMBER} $(echo "$PR_TITLE" | sed 's/\\/\\\\/g; s/"/\\"/g')"
          else
            TITLE="CI ${BRANCH} — $(echo "${COMMIT_MSG:0:50}" | sed 's/\\/\\\\/g; s/"/\\"/g')"
          fi

          # 判断状态
          if [ "$BE_RESULT" = "success" ] && [ "$FRONTEND_RESULT" = "success" ]; then
            STATUS="✅ 全部通过"
            STATUS_COLOR="green"
          elif [ "$BE_RESULT" = "failure" ] || [ "$FRONTEND_RESULT" = "failure" ]; then
            STATUS="❌ 构建失败"
            STATUS_COLOR="red"
          else
            STATUS="⚠️ 部分跳过"
            STATUS_COLOR="yellow"
          fi

          BE_EMOJI="✅"; [ "$BE_RESULT" != "success" ] && BE_EMOJI="❌"
          FRONTEND_EMOJI="✅"; [ "$FRONTEND_RESULT" != "success" ] && FRONTEND_EMOJI="⚠️"

          # 构建后端详情行
          BE_DETAIL="${BE_EMOJI} Java 后端"
          if [ -n "$TEST_SUMMARY" ] && [ "$TEST_SUMMARY" != "无测试结果" ]; then
            BE_DETAIL="${BE_DETAIL}\n 单测: ${TEST_SUMMARY}"
          fi
          if [ -n "$COVERAGE" ] && [ "$COVERAGE" != "N/A" ]; then
            BE_DETAIL="${BE_DETAIL}\n 覆盖率: ${COVERAGE}"
          fi

          curl -s --connect-timeout 30 --max-time 60 --retry 2 -X POST "$WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "$(cat <<JSON
          {
            "msg_type": "interactive",
            "card": {
              "header": {
                "title": { "tag": "plain_text", "content": "${STATUS}" },
                "template": "${STATUS_COLOR}"
              },
              "elements": [
                {
                  "tag": "div",
                  "text": {
                    "tag": "lark_md",
                    "content": "**${TITLE}**\n分支: ${BRANCH}\n仓库: ${REPO}"
                  }
                },
                { "tag": "hr" },
                {
                  "tag": "div",
                  "text": {
                    "tag": "lark_md",
                    "content": "${BE_DETAIL}\n${FRONTEND_EMOJI} Vue 前端"
                  }
                },
                {
                  "tag": "action",
                  "actions": [
                    {
                      "tag": "button",
                      "text": { "tag": "plain_text", "content": "查看详情" },
                      "url": "${RUN_URL}",
                      "type": "primary"
                    }
                  ]
                }
              ]
            }
          }
          JSON
          )"
